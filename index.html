<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RealHome" />
    <title>RealHome</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="icon" href="./icon-192.png" type="image/png" sizes="192x192" />
    <link rel="icon" href="./icon-512.png" type="image/png" sizes="512x512" />
    <!-- iOS needs PNG; SVG isn't picked up by Add-to-Home-Screen reliably. -->
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/styles.css" />

    <!-- Earliest-possible global error catcher. Runs before the importmap and
         the module script — if either fails (404, syntax, missing import),
         the user sees the actual error here instead of a blank page. -->
    <script>
      (function () {
        var banner;
        function show(msg) {
          if (!banner) {
            banner = document.createElement("div");
            banner.style.cssText =
              "position:fixed;top:0;left:0;right:0;background:rgba(180,40,40,0.95);" +
              "color:#fff;padding:10px 14px;font:13px/1.4 ui-monospace,Menlo,monospace;" +
              "z-index:99999;white-space:pre-wrap;max-height:50vh;overflow:auto;";
            (document.body || document.documentElement).appendChild(banner);
          }
          banner.appendChild(Object.assign(document.createElement("div"), {
            textContent: msg, style: "margin-top:4px;"
          }));
        }
        window.addEventListener("error", function (e) {
          var loc = e.filename
            ? "  " + (e.filename.split("/").pop()) + ":" + e.lineno
            : "";
          show("✗ " + (e.message || e.type) + (loc ? "\n" + loc : ""));
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          show("✗ unhandled: " + (r && r.message || r || "unknown"));
        });
      })();
    </script>

    <!-- All deps vendored into src/vendor. Truly offline-capable from first visit,
         no CDN dependency, repo-stable across runs. -->
    <script type="importmap">
      {
        "imports": {
          "three": "./src/vendor/three/build/three.module.js",
          "three/addons/": "./src/vendor/three/addons/",
          "three-mesh-bvh": "./src/vendor/three-mesh-bvh/build/index.module.js",
          "@gltf-transform/core": "./src/vendor/gltf-transform/core/index.js",
          "@gltf-transform/extensions": "./src/vendor/gltf-transform/extensions/index.js",
          "@gltf-transform/functions": "./src/vendor/gltf-transform/functions/index.js",
          "@azure/msal-browser": "./src/vendor/msal/index.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Worlds picker / pause menu (shown whenever pointer is unlocked) -->
    <div id="startOverlay" class="overlay">
      <div class="overlay-card">
        <h1>RealHome</h1>
        <p class="muted small">Click a world to step inside.</p>

        <ul id="worldsList" class="worlds-list" role="list"></ul>

        <!-- Persistent inline error/notice log. Provider failures, auth errors,
             cache failures appear here so they don't get swept away by the HUD. -->
        <div id="errorLog" class="error-log hidden" role="log"></div>

        <div class="actions">
          <button id="pickButton" type="button">Add a world</button>
          <button id="refreshButton" type="button" class="refresh-button" title="Check sources for updates">↻</button>
          <input type="file" id="fileInput" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden />
        </div>

        <!-- OneDrive sign-in / sign-out. Hidden until OneDrive provider is wired up. -->
        <div id="onedriveBar" class="onedrive-bar hidden">
          <span id="onedriveStatus" class="onedrive-status">Not signed in</span>
          <button id="onedriveSignIn" type="button" class="onedrive-button">Sign in with Microsoft</button>
          <button id="onedriveSignOut" type="button" class="onedrive-button hidden">Sign out</button>
        </div>

        <p class="muted small">
          <kbd>WASD</kbd> move &nbsp;·&nbsp; <kbd>Mouse</kbd> look &nbsp;·&nbsp; <kbd>Space</kbd> jump &nbsp;·&nbsp; <kbd>Esc</kbd> menu
        </p>

        <button id="cleanCacheButton" class="reset-link" type="button" title="Remove all cached worlds; bundled defaults reappear as available">
          Clean cache
        </button>
      </div>
    </div>

    <!-- Drag-drop overlay -->
    <div id="dropOverlay" class="drop-overlay hidden">
      <p>Drop .glb to load</p>
    </div>

    <!-- Progress bar (download + optimize during cache) -->
    <div id="progressBar" class="progress-bar hidden">
      <div id="progressLabel" class="progress-label"></div>
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <!-- Status HUD (top-left) -->
    <div id="hud" class="hud">
      <span id="hudName" class="hud-name">—</span>
      <span id="hudStatus" class="hud-status"></span>
    </div>

    <!-- New-version toast (PWA shell updated) -->
    <div id="updateToast" class="toast hidden">
      <span>New version available</span>
      <button id="updateReload" type="button">Reload</button>
    </div>

    <!-- World-content update toast (a cached world's source changed upstream) -->
    <div id="worldUpdateToast" class="toast hidden">
      <span id="worldUpdateText"></span>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
