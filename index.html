<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RealHome" />
    <title>RealHome</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />

    <!-- ES module resolution. SW pre-caches these URLs so it works offline on Quest after first visit. -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Worlds picker / pause menu (shown whenever pointer is unlocked) -->
    <div id="startOverlay" class="overlay">
      <div class="overlay-card">
        <h1>RealHome</h1>
        <p class="muted small">Click a world to step inside.</p>

        <ul id="worldsList" class="worlds-list" role="list"></ul>

        <div class="actions">
          <button id="pickButton" type="button">Add a world</button>
          <input type="file" id="fileInput" accept=".glb,.gltf,model/gltf-binary,model/gltf+json" hidden />
        </div>

        <p class="muted small">
          <kbd>WASD</kbd> move &nbsp;·&nbsp; <kbd>Mouse</kbd> look &nbsp;·&nbsp; <kbd>Space</kbd> jump &nbsp;·&nbsp; <kbd>Esc</kbd> menu
        </p>
      </div>
    </div>

    <!-- Drag-drop overlay -->
    <div id="dropOverlay" class="drop-overlay hidden">
      <p>Drop .glb to load</p>
    </div>

    <!-- Status HUD (top-left) -->
    <div id="hud" class="hud">
      <span id="hudName" class="hud-name">—</span>
      <span id="hudStatus" class="hud-status"></span>
    </div>

    <!-- New-version toast -->
    <div id="updateToast" class="toast hidden">
      <span>New version available</span>
      <button id="updateReload" type="button">Reload</button>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
