<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Full-bleed background. No rx — iOS / Android apply their own corner
       masks. Design content sits inside ~12% safe inset so iOS's ~22% corner
       radius and adaptive-icon masks never clip it. -->
  <rect width="1024" height="1024" fill="#0b0d10"/>
  <path d="M 256 480 L 512 224 L 768 480 L 768 800 L 588 800 L 588 624 L 436 624 L 436 800 L 256 800 Z"
        fill="none" stroke="#e8d6a8" stroke-width="56"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
